<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Bayar T. - Cloud App Dev at AWS, 9x AWS Certified, building a cinematic Three.js singularity portfolio."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg viewBox='0 0 64 64' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='64' height='64' fill='%2303050d'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%23000'/%3E%3Cellipse cx='32' cy='32' rx='27' ry='8' fill='none' stroke='%23ffb35b' stroke-width='4'/%3E%3C/svg%3E"
    />
    <style id="critical-loader-style">
      body {
        margin: 0;
        background: #010107;
        color: #f7fbff;
      }

      .app-shell.is-loading-scene .app-loader {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        align-content: center;
        gap: 1.2rem;
        min-height: 100vh;
        padding: 1.5rem;
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 50% 48%, rgba(255, 189, 112, 0.22), transparent 11rem),
          radial-gradient(ellipse at 50% 51%, rgba(255, 111, 34, 0.2) 0 8%, rgba(255, 184, 89, 0.13) 13%, transparent 31%),
          linear-gradient(145deg, #010106, #050712 54%, #010103);
      }

      .app-loader[hidden] {
        display: none;
      }

      .loader-mark {
        position: relative;
        width: clamp(7rem, 18vw, 12rem);
        aspect-ratio: 1;
      }

      .loader-ring,
      .loader-core,
      .loader-ring::before {
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }

      .loader-ring {
        border: 1px solid rgba(255, 189, 112, 0.22);
        box-shadow: 0 0 4rem rgba(255, 158, 68, 0.22);
        animation: loader-ring-sweep 1600ms linear infinite;
      }

      .loader-ring::before {
        content: "";
        inset: -0.18rem;
        border-top: 2px solid rgba(255, 246, 216, 0.95);
        border-right: 1px solid rgba(255, 177, 84, 0.58);
        border-bottom: 1px solid transparent;
        border-left: 1px solid transparent;
      }

      .loader-core {
        inset: 29%;
        border-radius: 46% 52% 49% 55%;
        background: #000;
        box-shadow: 0 0 2.4rem rgba(255, 186, 98, 0.32);
      }

      .loader-kicker {
        position: relative;
        margin: 0;
        color: rgba(247, 251, 255, 0.78);
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0;
      }

      .loader-stream {
        position: relative;
        display: flex;
        gap: 0.55rem;
        color: rgba(255, 215, 155, 0.58);
        font: 700 0.72rem/1 IBMPlexMono-Medium, ui-monospace, monospace;
        letter-spacing: 0;
        overflow: hidden;
      }

      .loader-stream span {
        animation: loader-stream-shift 1200ms steps(4, end) infinite;
      }

      @keyframes loader-ring-sweep {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes loader-stream-shift {
        50% {
          opacity: 0.42;
          transform: translateY(-1px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .loader-stream span {
          animation: none;
        }
      }
    </style>
    <title>Bayar T. | Singularity Portfolio</title>
  </head>
  <body>
    <main id="app" class="app-shell is-loading-scene" data-mode="intro" aria-busy="true">
      <div id="app-loader" class="app-loader" role="status" aria-live="polite">
        <div class="loader-mark" aria-hidden="true">
          <span class="loader-ring"></span>
          <span class="loader-core"></span>
        </div>
        <p class="loader-kicker">Initializing singularity</p>
        <div class="loader-stream" aria-hidden="true">
          <span>+==----==</span>
          <span>--==++==</span>
          <span>==--==++</span>
        </div>
      </div>
      <button
        id="tilt-toggle"
        class="tilt-toggle"
        type="button"
        aria-pressed="false"
        aria-label="Enable phone tilt motion"
      >
        <span class="tilt-glyph" aria-hidden="true">
          <span class="tilt-glyph-core"></span>
        </span>
        <span class="tilt-label">Tilt</span>
        <span class="tilt-state">Off</span>
      </button>
      <div id="profile-root"></div>
      <section id="singularity-stage" class="singularity-stage" aria-label="Interactive singularity navigation">
        <canvas id="singularity-canvas" aria-hidden="true"></canvas>
        <div class="event-horizon" aria-hidden="true"></div>
        <nav id="orbit-controls" class="orbit-controls" aria-label="Portfolio sections"></nav>
      </section>
      <p id="webgl-status" class="system-status" aria-live="polite"></p>
      <p id="reduced-motion-note" class="system-status reduced-motion-note">
        Reduced motion is active: section changes use fades instead of camera dives.
      </p>
      <div id="section-panels" class="section-panels" aria-live="polite"></div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
